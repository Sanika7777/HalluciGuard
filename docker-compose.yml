services:

  # ───────────── BACKEND ─────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hallucination-backend
    ports:
      - "8000:8000"

    env_file:
      - .env

    environment:
      - ALLOWED_ORIGINS=https://halluguard.vercel.app
      - PRODUCTION=false
      - PROMPT_RISK_THRESHOLD=0.65
      - HALLUCINATION_THRESHOLD=0.65

    restart: unless-stopped
    networks:
      - hallnet

  # ───────────── PROMETHEUS ─────────────
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - hallnet


  # ───────────── GRAFANA ─────────────
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    restart: unless-stopped
    networks:
      - hallnet


# ───────────── NETWORK ─────────────
networks:
  hallnet:
    driver: bridge