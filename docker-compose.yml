version: "3.9"

services:

  # ───────────── BACKEND ─────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: hallucination-backend
    ports:
      - "8000:8000"
    environment:
      - API_KEY=${API_KEY:-dev-hallucination-key-2026}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5}
      - ALLOWED_ORIGINS=https://halluguard.vercel.app
      - PRODUCTION=${PRODUCTION:-false}
      - OLLAMA_BASE=http://ollama:11434
    restart: unless-stopped
    networks:
      - hallnet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ───────────── FRONTEND ─────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hallucination-frontend
    ports:
      - "3000:3000"
    environment:
      - FASTAPI_URL=http://backend:8000
      - FASTAPI_KEY=${API_KEY:-dev-hallucination-key-2026}
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - hallnet

  # ───────────── PROMETHEUS ─────────────
  prometheus:
    image: prom/prometheus
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    restart: unless-stopped
    networks:
      - hallnet

  # ───────────── GRAFANA ─────────────
  grafana:
    image: grafana/grafana
    container_name: grafana
    ports:
      - "3001:3000"
    restart: unless-stopped
    networks:
      - hallnet


# ───────────── NETWORK ─────────────
networks:
  hallnet:
    driver: bridge