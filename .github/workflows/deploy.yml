name: HalluciGuard CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Lint (runs on every push + PR) ──────────────────────
  lint:
    name: Flake8 Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Flake8
        run: pip install flake8

      - name: Run Flake8
        run: |
          flake8 backend/ \
            --max-line-length=120 \
            --exclude=backend/__pycache__,backend/pkl \
            --ignore=E501,W503

  # ── Job 2: Deploy to EC2 (only on push to main, after lint passes) ──
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: lint                        # won't deploy if lint fails
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          HG_PAT: ${{ secrets.HG_PAT }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: HG_PAT
          timeout: 120s
          script: |
            set -e

            # ── Clone or update repo ──────────────────────────────
            rm -rf /home/ubuntu/halluciguard
            git clone https://${HG_PAT}@github.com/Sanika7777/HalluciGuard.git /home/ubuntu/halluciguard

            cd /home/ubuntu/halluciguard
            git fetch origin main
            git reset --hard origin/main

            # ── Write .env from secrets ───────────────────────────
            cat > .env <<EOF
            API_KEY=${{ secrets.API_KEY }}
            ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
            CLAUDE_MODEL=claude-sonnet-4-5
            PRODUCTION=true
            ALLOWED_ORIGINS=http://${{ secrets.EC2_HOST }},http://${{ secrets.EC2_HOST }}:3000
            EOF

            # ── Rebuild and restart containers ────────────────────
            docker compose down --remove-orphans
            docker compose build --no-cache
            docker compose up -d

            # ── Health check ──────────────────────────────────────
            echo "Waiting for backend to be healthy..."
            sleep 20
            curl --fail http://localhost:8000/health || (echo "Health check failed!" && exit 1)

            echo "✅ Deployment successful."